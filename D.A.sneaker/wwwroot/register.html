<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/menu.css">
    <style>
        .logo {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg,#3b82f6,#22c55e);
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: .5px;
            transition: .3s;
        }

            .logo:hover {
                transform: scale(1.05);
            }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            transition: .25s;
        }
        .register-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
        }
        /* ===== HAMBURGER BUTTON ===== */
        .hamburger {
            position: fixed;
            top: 18px;
            left: 20px;
            z-index: 1001;
            cursor: pointer;
            width: 28px;
        }

            .hamburger span {
                display: block;
                height: 3px;
                background: var(--text);
                margin: 6px 0;
                border-radius: 3px;
                transition: .3s;
            }

        body {
            padding-top: 70px;
        }

        .header-row {
            align-items: center;
            gap: 18px;
        }

        .logo {
            font-size: 22px;
            font-weight: 900;
            color: var(--text);
            text-decoration: none;
        }

        body {
            margin: 0;
            font-family: Inter,Arial;
            background: linear-gradient(180deg,#070d1a,#0b1220);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* đổi từ height thành min-height */
        }
        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            top: 0;
            left: -260px;
            width: 260px;
            height: 100%;
            background: var(--panel);
            box-shadow: 6px 0 20px rgba(0,0,0,.5);
            padding-top: 80px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: .35s;
            z-index: 1002;
        }

            .sidebar a {
                color: var(--text);
                text-decoration: none;
                padding: 14px 26px;
                font-size: 16px;
                transition: .2s;
            }

                .sidebar a:hover {
                    background: #0f172a;
                    color: #3b82f6;
                }

            .sidebar.show {
                left: 0;
            }

        .card {
            background: #0f172a;
            padding: 35px;
            border-radius: 20px;
            width: 100%;
            max-width: 380px; /* thay vì width cố định */
            box-shadow: 0 20px 50px rgba(0,0,0,.5);
            color: #e5e7eb;
        }

        h2 {
            margin: 0 0 20px;
            text-align: center;
            color: var(--text);
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #1f2a44;
            background: #020617;
            color: #e5e7eb;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #3b82f6;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: .2s;
        }

            button:hover {
                background: #2563eb;
            }

        .link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

            .link a {
                color: #3b82f6;
                text-decoration: none;
            }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.5);
            opacity: 0;
            pointer-events: none;
            transition: .3s;
            z-index: 1000;
        }

            .overlay.show {
                opacity: 1;
                pointer-events: auto;
            }
    </style>
</head>
<body>
    <header class="header">

        <div class="container header-row">

            <!-- HAMBURGER -->
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <!-- LOGO -->
            <a href="shop.html" class="logo">
                SneakerShop
            </a>
        </div>

    </header>
    <!-- SIDEBAR MENU -->
    <div id="sidebar" class="sidebar">
        <a href="login.html"> Đăng Nhập</a>
        <a href="shop.html"> Cửa hàng</a>
        <a href="cart.html"> Giỏ hàng</a>
        <a href="checkout.html"> Thanh toán</a>
        <a href="about.html"> Về chúng tôi</a>
        <a href="Ai.html">AI tư vấn</a>
    </div>

    <div class="card">
        <h2>Đăng ký</h2>

        <input id="username" placeholder="Tên đăng nhập">

        <input id="name" placeholder="Họ và tên">

        <input id="email" placeholder="Email">

        <input id="password" type="password" placeholder="Mật khẩu">

        <button onclick="register()">Đăng ký</button>

        <div class="link">
            Đã có tài khoản? <a href="login.html">Đăng nhập</a>
        </div>
    </div>
  
    <script>
        async function register() {

            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const res = await fetch("/api/auth/register", {
                method: "POST",
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name,
                    email,
                    password
                })
            });

            if (!res.ok) {
                alert("Email đã tồn tại");
                return;
            }

            alert("Đăng ký thành công!");
            window.location.href = "login.html";
        }
    </script>
    <script src="js/Header.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/Account.js"></script>
</body>
</html>
