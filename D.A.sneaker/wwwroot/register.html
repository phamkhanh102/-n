<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>

    <style>
        * {
            box-sizing: border-box;
        }
        :root {
            --bg: #0b1220;
            --panel: #0f172a;
            --text: #e5e7eb;
            --accent: #3b82f6;
        }

        body {
            margin: 0;
            font-family: Inter,Arial;
            background: linear-gradient(180deg,#070d1a,#0b1220);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* đổi từ height thành min-height */
        }

        .card {
            background: #0f172a;
            padding: 35px;
            border-radius: 20px;
            width: 100%;
            max-width: 380px; /* thay vì width cố định */
            box-shadow: 0 20px 50px rgba(0,0,0,.5);
            color: #e5e7eb;
        }

        h2 {
            margin: 0 0 20px;
            text-align: center;
            color: var(--text);
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #1f2a44;
            background: #020617;
            color: #e5e7eb;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #3b82f6;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: .2s;
        }

            button:hover {
                background: #2563eb;
            }

        .link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

            .link a {
                color: #3b82f6;
                text-decoration: none;
            }
    </style>
</head>

<body>

    <div class="card">
        <h2>Đăng ký</h2>

        <input type="text" id="name" placeholder="Họ tên">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Mật khẩu">

        <button onclick="register()">Đăng ký</button>

        <div class="link">
            Đã có tài khoản? <a href="login.html">Đăng nhập</a>
        </div>
    </div>

    <script>
async function register(){

const name=document.getElementById("name").value;
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

const res=await fetch("/api/auth/register",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
name,
email,
password
})
});

if(!res.ok){
alert("Email đã tồn tại");
return;
}

alert("Đăng ký thành công!");
window.location.href="login.html";
}
    </script>

</body>
</html>
