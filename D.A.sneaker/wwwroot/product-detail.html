<!DOCTYPE html>

<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SneakerShop - Chi tiết sản phẩm</title>
    <link rel="stylesheet" href="/css/site.css">
    <style>
        :root {
            --bg: #070d1a;
            --panel: #0b1326;
            --card: #0f172a;
            --border: #1f2a44;
            --text: #e5e7eb;
            --muted: #94a3b8;
            --accent: #2563eb;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: Inter,Arial,Helvetica,sans-serif;
            background: linear-gradient(180deg,#070d1a,#020617);
            color: var(--text);
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 0 16px
        }

        /* HEADER */
        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(2,6,23,.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        .header-row {
            display: flex;
            gap: 16px;
            align-items: center;
            padding: 14px 0
        }

        .logo {
            font-weight: 800;
            font-size: 22px
        }

        .search {
            flex: 1;
            display: flex;
            gap: 8px
        }

            .search input {
                flex: 1;
                padding: 11px;
                border-radius: 10px;
                border: 1px solid var(--border);
                background: #020617;
                color: white
            }

        .btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 11px 16px;
            border-radius: 10px;
            cursor: pointer
        }

        /* LAYOUT */
        .product-layout {
            display: grid;
            grid-template-columns: 1.1fr 1fr;
            gap: 32px;
            margin-top: 24px
        }

        /* GALLERY */
        .gallery {
            background: var(--panel);
            padding: 18px;
            border-radius: 18px;
            border: 1px solid var(--border)
        }

        .main-image {
            width: 100%;
            height: 420px;
            object-fit: contain;
            background: #020617;
            border-radius: 12px
        }

        .thumbs {
            display: flex;
            gap: 10px;
            margin-top: 12px
        }

        .thumb {
            width: 80px;
            height: 70px;
            background: #020617;
            border-radius: 8px;
            border: 2px solid transparent;
            object-fit: contain;
            cursor: pointer;
            transition: .15s
        }

            .thumb:hover {
                border-color: var(--accent)
            }

            .thumb.active {
                border-color: var(--accent)
            }

        /* INFO */
        .info {
            background: var(--panel);
            padding: 22px;
            border-radius: 18px;
            border: 1px solid var(--border)
        }

        .breadcrumb {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 6px
        }

        .title {
            font-size: 30px;
            font-weight: 700;
            margin: 6px 0 12px
        }

        .price-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px
        }

        .old-price {
            text-decoration: line-through;
            color: #9ca3af
        }

        .price {
            color: var(--danger);
            font-size: 26px;
            font-weight: 800
        }

        .badge {
            background: var(--danger);
            padding: 5px 8px;
            border-radius: 6px;
            font-size: 12px
        }

        .features {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 12px;
            margin: 14px 0
        }

        .feature {
            background: #020617;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            font-size: 13px
        }

        .section-title {
            margin-top: 18px;
            margin-bottom: 8px;
            font-weight: 600
        }

        /* SIZE */
        .sizes {
            display: flex;
            gap: 10px;
            flex-wrap: wrap
        }

        .size {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            background: #020617
        }

            .size.active {
                border-color: var(--accent);
                background: #0a1b44
            }
        .options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px
        }

        .opt {
            padding: 8px 14px;
            border: 1px solid #444;
            border-radius: 8px;
            cursor: pointer;
        }

            .opt.active {
                border: 2px solid #3b82f6;
                background: #0b1326;
            }

            .opt.disabled {
                opacity: .3;
                pointer-events: none;
            }
        /* QTY */
        .qty {
            display: flex;
            align-items: center;
            margin-top: 10px
        }

            .qty button {
                width: 34px;
                height: 34px;
                border: none;
                background: #020617;
                color: white;
                cursor: pointer
            }

            .qty input {
                width: 50px;
                text-align: center;
                background: #020617;
                border: 1px solid var(--border);
                color: white;
                height: 34px
            }

        /* BUTTONS */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 16px
        }

        .buy {
            background: var(--danger)
        }

        .add {
            background: var(--accent)
        }

        .actions button {
            padding: 14px;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            cursor: pointer
        }

        /* DESCRIPTION */
        .desc {
            margin-top: 30px;
            background: var(--panel);
            padding: 20px;
            border-radius: 18px;
            border: 1px solid var(--border)
        }

            .desc h3 {
                margin-top: 0
            }

        @media(max-width:900px) {
            .product-layout {
                grid-template-columns: 1fr
            }
        }
    </style>

</head>
<body>

    <header class="header">
        <div class="header-row">

            <div class="logo" onclick="location.href='shop.html'" style="cursor:pointer">
                SneakerShop
            </div>

            <div class="search-box">
                <div class="search">
                    <input id="" placeholder="">
                    <button type="button" onclick="doSearch()">Tìm</button>
                </div>
                <div id="suggestions" class="suggestions"></div>
            </div>

            <a href="checkout.html" class="checkout-btn">Thanh toán</a>

        </div>
    </header>


    <div class="container">

        <div class="product-layout">

            <!-- GALLERY -->

            <div class="gallery">
                <img id="mainImg" class="main-image">
                <div class="thumbs" id="thumbs"></div>
            </div>

            <!-- INFO -->

            <div class="info">
                <div class="breadcrumb" id="breadcrumb"></div>
                <div class="title" id="pName"></div>

                <div class="price-row">
                    <div class="old-price" id="oldPrice"></div>
                    <div class="price" id="price"></div>
                    <div class="badge" id="discount"></div>
                </div>

                <div class="features">
                    <div class="feature">✔ Cam kết chính hãng 100%</div>
                    <div class="feature">✔ Giao nhanh 1-2 ngày</div>
                    <div class="feature">✔ Đổi size trong 7 ngày</div>
                    <div class="feature">✔ Thanh toán khi nhận hàng</div>
                </div>

                <div class="choose">
                    <div>
                        <h3>Màu</h3>
                        <div id="colors" class="options"></div>
                    </div>

                    <div>
                        <h3>Size</h3>
                        <div id="sizes" class="options"></div>
                    </div>

                    <button id="addCart">Thêm vào giỏ</button>
                </div>

                <div class="section-title">Số lượng</div>
                <div class="qty">
                    <button onclick="changeQty(-1)">-</button>
                    <input id="qty" value="1">
                    <button onclick="changeQty(1)">+</button>
                </div>

                <div class="actions">
                    <button class="buy">MUA NGAY</button>
                    <button class="add" onclick="addToCart()">THÊM VÀO GIỎ HÀNG</button>
                </div>
            </div>
        </div>

        <div class="desc">
            <h3>Mô tả sản phẩm</h3>
            <p>Air Force 1 là mẫu giày huyền thoại của Nike. Phiên bản Panda 2025 mang phối màu trắng đen tối giản phù hợp mọi outfit streetwear.</p>
        </div>

    </div>
    <script>
        let product = null;
        let selectedColor = null;
        let selectedSize = null;
        let selectedVariantId = null;

        const id = new URLSearchParams(location.search).get("id");

        loadProduct();

        async function loadProduct() {

            const res = await fetch(`/api/products/products/${id}`);
            const data = await res.json();

            product = data.product;

            // ===== TEXT =====
            document.getElementById("pName").innerText = product.name;
            document.getElementById("price").innerText =
                product.price.toLocaleString() + "đ";
            document.querySelector(".desc p").innerText = product.description;

            // ===== MAIN IMAGE =====
            document.getElementById("mainImg").src =
                "/images/" + product.mainImage;

            // ===== GALLERY =====
            const thumbs = document.getElementById("thumbs");
            thumbs.innerHTML = "";

            data.images.forEach(img => {
                const el = document.createElement("img");
                el.src = "/images/" + img.imageUrl;
                el.className = "thumb";
                el.onclick = () => document.getElementById("mainImg").src = el.src;
                thumbs.appendChild(el);
            });

            renderOptions(data.variants);
        }

        function renderOptions(variants) {

            // COLORS
            const colors = [...new Set(variants.map(v => v.colorName))];

            document.getElementById("colors").innerHTML =
                colors.map(c => `<div class="opt" onclick="chooseColor('${c}',this)">${c}</div>`).join("");

            // SIZES
            const sizes = [...new Set(variants.map(v => v.sizeValue))];

            document.getElementById("sizes").innerHTML =
                sizes.map(s => `<div class="opt" onclick="chooseSize(${s},this)">${s}</div>`).join("");

            window.variants = variants;
        }

        function chooseColor(color, el) {
            selectedColor = color;
            document.querySelectorAll("#colors .opt").forEach(x => x.classList.remove("active"));
            el.classList.add("active");
            findVariant();
        }

        function chooseSize(size, el) {
            selectedSize = size;
            document.querySelectorAll("#sizes .opt").forEach(x => x.classList.remove("active"));
            el.classList.add("active");
            findVariant();
        }

        function findVariant() {
            const v = variants.find(x => x.colorName === selectedColor && x.sizeValue === selectedSize);
            selectedVariantId = v?.variantId ?? null;
        }

        document.getElementById("addCart").onclick = () => {
            if (!selectedVariantId) {
                alert("Chọn size & màu!");
                return;
            }

            let cart = JSON.parse(localStorage.getItem("cart") || "[]");

            const exist = cart.find(x => x.variantId === selectedVariantId);
            if (exist) exist.qty++;
            else cart.push({
                variantId: selectedVariantId,
                productId: product.id,
                name: product.name,
                image: product.mainImage,
                price: product.price,
                color: selectedColor,
                size: selectedSize,
                qty: 1
            });

            localStorage.setItem("cart", JSON.stringify(cart));
            alert("Đã thêm vào giỏ 🛒");
        }
    </script>
    <script>
        let allProducts = [];

        async function loadHeaderProducts() {
            try {
                const r = await fetch('/api/products');
                allProducts = await r.json();
            } catch {
                allProducts = [
                    { Name: "Nike Air Force 1", Brand: "Nike" },
                    { Name: "Adidas Ultraboost 22", Brand: "Adidas" },
                    { Name: "Converse Chuck 70", Brand: "Converse" },
                    { Name: "Nike ZoomX Vaporfly", Brand: "Nike" }
                ];
            }
        }
        loadHeaderProducts();

        const input = document.getElementById("q");
        const box = document.getElementById("suggestions");

        /* GỢI Ý */
        input.addEventListener("input", () => {
            const text = input.value.toLowerCase().trim();

            if (!text) {
                box.style.display = "none";
                return;
            }

            const matches = allProducts
                .filter(p => p.Name.toLowerCase().includes(text) ||
                    (p.Brand || "").toLowerCase().includes(text))
                .slice(0, 6);

            if (!matches.length) {
                box.style.display = "none";
                return;
            }

            box.innerHTML = matches.map(p =>
                `<div onclick="selectSearch('${p.Name}')">
                        ${p.Name} <span style="color:#64748b">- ${p.Brand || ""}</span>
                    </div>`
            ).join("");

            box.style.display = "block";
        });

        function selectSearch(name) {
            input.value = name;
            box.style.display = "none";
            goSearchPage();
        }

        function doSearch() { goSearchPage(); }

        function goSearchPage() {
            const q = encodeURIComponent(input.value);
            location.href = `shop.html?q=${q}`;
        }

        /* ENTER */
        input.addEventListener("keydown", e => {
            if (e.key === "Enter") goSearchPage();
        });

        /* CLICK OUTSIDE */
        document.addEventListener("click", e => {
            if (!e.target.closest(".search-box"))
                box.style.display = "none";
        });
    
    </script>
</body>
</html>
