<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARK AI – Tư vấn giày thông minh</title>
    <meta name="description" content="Trợ lý AI SPARK giúp bạn tư vấn chọn giày, kiểm tra size, xem khuyến mãi và hỗ trợ đặt hàng 24/7.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #f8fafc;
            --surface:  #ffffff;
            --border:   #e2e8f0;
            --text:     #0f172a;
            --muted:    #64748b;
            --brand:    #6366f1;
            --brand2:   #8b5cf6;
            --sky:      #0ea5e9;
            --green:    #22c55e;
            --radius:   16px;
        }
        html.dark {
            --bg:      #0f172a;
            --surface: #1e293b;
            --border:  #334155;
            --text:    #f1f5f9;
            --muted:   #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Shared header ─────────────────────────────── */
        #header { position: sticky; top: 0; z-index: 100; }

        /* ── Page layout ────────────────────────────────── */
        .ai-page {
            flex: 1;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 0;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 24px 20px;
            gap: 20px;
        }

        /* ── Sidebar ─────────────────────────────────────── */
        .ai-sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .sidebar-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
        }

        .sidebar-card h3 {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .6px;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .quick-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .quick-tile {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            text-align: center;
            transition: all .2s;
            line-height: 1.4;
        }
        .quick-tile:hover {
            border-color: var(--brand);
            color: var(--brand);
            background: rgba(99,102,241,.06);
        }

        .coupon-list { display: flex; flex-direction: column; gap: 6px; }
        .coupon-chip {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg); border: 1px dashed var(--border);
            border-radius: 8px; padding: 6px 10px;
            font-size: 12px; cursor: pointer; transition: all .2s;
        }
        .coupon-chip:hover { border-color: var(--green); }
        .coupon-code { font-weight: 800; font-family: monospace; color: var(--brand); font-size: 13px; }
        .coupon-desc { color: var(--muted); font-size: 11px; }

        /* ── Main chat ─────────────────────────────────── */
        .chat-main {
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            height: calc(100vh - 120px);
            min-height: 500px;
        }

        /* CHAT HEADER */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, var(--brand), var(--brand2));
            color: #fff;
        }
        .chat-avatar {
            width: 42px; height: 42px;
            background: rgba(255,255,255,.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }
        .chat-header-info h2 { font-size: 16px; font-weight: 700; }
        .chat-header-info p  { font-size: 12px; opacity: .8; margin-top: 2px; }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #4ade80; display: inline-block; margin-right: 5px;
            animation: blink 2s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

        .chat-header-actions { margin-left: auto; display: flex; gap: 8px; }
        .hdr-action-btn {
            background: rgba(255,255,255,.15); border: none; color: #fff;
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
            font-size: 15px; display: flex; align-items: center; justify-content: center;
            transition: background .2s;
        }
        .hdr-action-btn:hover { background: rgba(255,255,255,.28); }

        /* MESSAGES */
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 12px;
            scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .msg-row { display: flex; gap: 10px; align-items: flex-end; }
        .msg-row.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, var(--brand), var(--brand2));
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
            color: #fff; font-weight: 700; font-size: 13px;
        }
        .msg-avatar.user-av {
            background: linear-gradient(135deg, var(--sky), #0284c7);
        }

        .msg-bubble {
            max-width: 72%;
            padding: 12px 16px;
            border-radius: 18px 18px 18px 4px;
            font-size: 14px;
            line-height: 1.65;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
        }
        .msg-row.user .msg-bubble {
            background: linear-gradient(135deg, var(--sky), #0284c7);
            color: #fff;
            border-radius: 18px 18px 4px 18px;
            border: none;
        }
        .msg-bubble b { font-weight: 700; }
        .msg-bubble code {
            background: rgba(99,102,241,.1);
            padding: 1px 5px; border-radius: 4px;
            font-size: 12px; font-family: monospace;
        }
        .msg-time {
            font-size: 10px; color: var(--muted);
            margin-top: 4px; text-align: right;
        }
        .msg-row.user .msg-time { text-align: left; }

        /* TYPING */
        .typing-dots { display: flex; gap: 4px; padding: 4px 0; }
        .typing-dots span {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--brand); opacity: .6;
            animation: typingBounce 1.2s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: .2s; }
        .typing-dots span:nth-child(3) { animation-delay: .4s; }
        @keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

        /* PRODUCT CARDS */
        .product-cards-row {
            display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px;
        }
        .prod-card-link {
            display: flex; flex-direction: column;
            width: 130px; border-radius: 12px; overflow: hidden;
            border: 1px solid var(--border); background: var(--surface);
            text-decoration: none; color: var(--text);
            transition: transform .2s, box-shadow .2s;
        }
        .prod-card-link:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,.1); }
        .prod-card-link img {
            width: 100%; height: 90px; object-fit: cover;
            background: var(--bg);
        }
        .prod-card-body { padding: 8px; }
        .prod-card-name { font-size: 11px; font-weight: 700; line-height: 1.3; margin-bottom: 4px; }
        .prod-card-price { font-size: 12px; font-weight: 800; color: var(--brand); }

        /* INPUT ROW */
        .chat-input-area {
            padding: 14px 16px;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }
        .chat-input-row {
            display: flex; gap: 10px; align-items: center;
        }
        .chat-input {
            flex: 1; padding: 12px 16px;
            background: var(--bg); border: 1.5px solid var(--border);
            border-radius: 12px; font-size: 14px; color: var(--text);
            outline: none; transition: border-color .2s; font-family: inherit;
        }
        .chat-input:focus { border-color: var(--brand); }
        .chat-input::placeholder { color: var(--muted); }
        .send-btn {
            width: 44px; height: 44px; border-radius: 12px;
            background: linear-gradient(135deg, var(--brand), var(--brand2));
            border: none; color: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: opacity .2s; flex-shrink: 0;
        }
        .send-btn:hover { opacity: .85; }
        .send-btn:disabled { opacity: .45; cursor: not-allowed; }

        /* INTENT TAG */
        .intent-tag {
            display: inline-block;
            font-size: 10px; font-weight: 700; padding: 2px 7px;
            border-radius: 10px; margin-bottom: 4px;
            text-transform: uppercase; letter-spacing: .5px;
        }
        .intent-ProductSearch { background: #dbeafe; color: #1d4ed8; }
        .intent-OffTopic      { background: #fef3c7; color: #92400e; }
        .intent-Promotion     { background: #dcfce7; color: #166534; }
        .intent-SizeGuide     { background: #f3e8ff; color: #7c3aed; }
        .intent-Policy        { background: #e0f2fe; color: #0369a1; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .ai-page { grid-template-columns: 1fr; }
            .ai-sidebar { display: none; }
            .chat-main { height: calc(100vh - 80px); border-radius: 0; }
        }
    </style>
</head>
<body>
    <div id="header"></div>

    <div class="ai-page">

        <!-- ── SIDEBAR ─────────────────────────────────── -->
        <aside class="ai-sidebar">

            <div class="sidebar-card">
                <h3>💬 Hỏi nhanh</h3>
                <div class="quick-grid">
                    <button class="quick-tile" onclick="quickSend('Bảng size giày SPARK')">📏 Size giày</button>
                    <button class="quick-tile" onclick="quickSend('Mã giảm giá hiện có')">🎟️ Mã KM</button>
                    <button class="quick-tile" onclick="quickSend('Chính sách đổi trả')">🔄 Đổi trả</button>
                    <button class="quick-tile" onclick="quickSend('Giày Nike chạy bộ')">👟 Nike run</button>
                    <button class="quick-tile" onclick="quickSend('Giày Adidas thời trang')">🟢 Adidas</button>
                    <button class="quick-tile" onclick="quickSend('Tư vấn giày dưới 2 triệu')">💰 Dưới 2M</button>
                    <button class="quick-tile" onclick="quickSend('Giày tập gym')">💪 Gym</button>
                    <button class="quick-tile" onclick="quickSend('Giày đi học casual')">🎒 Đi học</button>
                </div>
            </div>

            <div class="sidebar-card">
                <h3>🎟️ Mã giảm giá</h3>
                <div class="coupon-list">
                    <div class="coupon-chip" onclick="quickSend('Mã SPARK50 có dùng được không?')">
                        <span class="coupon-code">SPARK50</span>
                        <span class="coupon-desc">Giảm 50%</span>
                    </div>
                    <div class="coupon-chip" onclick="quickSend('Mã SPARK30 có dùng được không?')">
                        <span class="coupon-code">SPARK30</span>
                        <span class="coupon-desc">Giảm 30%</span>
                    </div>
                    <div class="coupon-chip" onclick="quickSend('Mã VIPDAY có dùng được không?')">
                        <span class="coupon-code">VIPDAY</span>
                        <span class="coupon-desc">VIP 40%</span>
                    </div>
                    <div class="coupon-chip" onclick="quickSend('Mã FREESHIP có dùng được không?')">
                        <span class="coupon-code">FREESHIP</span>
                        <span class="coupon-desc">Miễn ship</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-card">
                <h3>📌 Thông tin shop</h3>
                <div style="font-size:12px;color:var(--muted);line-height:1.8">
                    📍 123 Lê Lợi, TP.HCM<br>
                    📞 Hotline: <b style="color:var(--text)">1800 1234</b><br>
                    ⏰ 8:00 – 21:00 hàng ngày<br>
                    ✉️ support@sparksneaker.vn
                </div>
            </div>

        </aside>

        <!-- ── MAIN CHAT ────────────────────────────────── -->
        <div class="chat-main">

            <!-- Header -->
            <div class="chat-header">
                <div class="chat-avatar">🤖</div>
                <div class="chat-header-info">
                    <h2>SPARK AI Tư Vấn</h2>
                    <p><span class="status-dot"></span>Đang hoạt động · Powered by Ollama</p>
                </div>
                <div class="chat-header-actions">
                    <button class="hdr-action-btn" title="Xóa lịch sử" onclick="clearChat()">🗑</button>
                    <a href="/page/shop.html" class="hdr-action-btn" title="Về trang chủ" style="text-decoration:none;display:flex;align-items:center;justify-content:center">🏠</a>
                </div>
            </div>

            <!-- Messages -->
            <div class="chat-messages" id="chatMessages"></div>

            <!-- Input -->
            <div class="chat-input-area">
                <div class="chat-input-row">
                    <input id="chatInput" class="chat-input"
                        placeholder="Hỏi về Nike, Adidas, size giày, mã giảm giá..."
                        maxlength="400" autocomplete="off">
                    <button class="send-btn" id="sendBtn" onclick="sendChat()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
                            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script src="/js/layout.js"></script>
    <script>
        // ── State ─────────────────────────────────────────
        const messagesEl = document.getElementById('chatMessages');
        const inputEl    = document.getElementById('chatInput');
        const sendBtnEl  = document.getElementById('sendBtn');

        // ── Render helpers ────────────────────────────────
        function mdToHtml(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
        }

        function timeNow() {
            return new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
        }

        function addMsg(html, type = 'bot', intent = '') {
            const isBot = type === 'bot';
            const row = document.createElement('div');
            row.className = `msg-row ${type}`;

            const avEl = document.createElement('div');
            avEl.className = `msg-avatar${isBot ? '' : ' user-av'}`;
            avEl.textContent = isBot ? '🤖' : getUserInitial();

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';

            if (intent && intent !== 'General') {
                const tag = document.createElement('div');
                tag.className = `intent-tag intent-${intent}`;
                tag.textContent = intentLabel(intent);
                bubble.appendChild(tag);
            }
            const content = document.createElement('div');
            content.innerHTML = html;
            bubble.appendChild(content);

            const timeEl = document.createElement('div');
            timeEl.className = 'msg-time';
            timeEl.textContent = timeNow();
            bubble.appendChild(timeEl);

            row.appendChild(avEl);
            row.appendChild(bubble);
            messagesEl.appendChild(row);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return row;
        }

        function intentLabel(intent) {
            const map = {
                ProductSearch: '👟 Sản phẩm',
                SizeGuide:     '📏 Size',
                Promotion:     '🎟️ Khuyến mãi',
                Policy:        '📋 Chính sách',
                OffTopic:      '🚫 Ngoài chủ đề',
                OrderStatus:   '📦 Đơn hàng',
            };
            return map[intent] || intent;
        }

        function getUserInitial() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const n = user?.name || localStorage.getItem('name') || 'U';
            return n.charAt(0).toUpperCase();
        }

        function showTyping() {
            const row = document.createElement('div');
            row.className = 'msg-row bot';
            row.id = 'typingRow';
            row.innerHTML = `
                <div class="msg-avatar">🤖</div>
                <div class="msg-bubble">
                    <div class="typing-dots"><span></span><span></span><span></span></div>
                </div>`;
            messagesEl.appendChild(row);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }
        function removeTyping() {
            document.getElementById('typingRow')?.remove();
        }

        // ── Product cards ─────────────────────────────────
        function renderProductCards(products) {
            if (!products?.length) return;
            const row = document.createElement('div');
            row.className = 'msg-row bot';
            const av = document.createElement('div');
            av.className = 'msg-avatar';
            av.textContent = '🤖';

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.innerHTML = `<div style="font-weight:700;margin-bottom:8px">Đây là các mẫu phù hợp 👟</div>`;

            const cards = document.createElement('div');
            cards.className = 'product-cards-row';
            products.slice(0, 4).forEach(p => {
                const name  = p.Name  ?? p.name  ?? 'Sản phẩm';
                const price = p.Price ?? p.price ?? 0;
                const id    = p.Id    ?? p.id    ?? '';
                const img   = (() => {
                    const r = p.MainImage ?? p.mainImage ?? p.ImageUrl ?? p.imageUrl ?? '';
                    return r.startsWith('http') ? r : (r ? '/' + r.replace(/^\//, '') : 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=300&q=80');
                })();
                const a = document.createElement('a');
                a.className = 'prod-card-link';
                a.href = `/page/product-detail.html?id=${id}`;
                a.innerHTML = `
                    <img src="${img}" alt="${name}" onerror="this.src='https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=300&q=80'">
                    <div class="prod-card-body">
                        <div class="prod-card-name">${name}</div>
                        <div class="prod-card-price">${Number(price).toLocaleString('vi-VN')}đ</div>
                    </div>`;
                cards.appendChild(a);
            });
            bubble.appendChild(cards);
            row.appendChild(av);
            row.appendChild(bubble);
            messagesEl.appendChild(row);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        // ── API call ──────────────────────────────────────
        async function callAPI(text) {
            const token = localStorage.getItem('token') || '';
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers,
                body: JSON.stringify(text)
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
        }

        // ── Send ──────────────────────────────────────────
        async function sendChat() {
            const text = inputEl.value.trim();
            if (!text || sendBtnEl.disabled) return;

            addMsg(text, 'user');
            inputEl.value = '';
            inputEl.disabled = true;
            sendBtnEl.disabled = true;

            showTyping();

            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), 50000);

            try {
                const data = await callAPI(text);
                clearTimeout(timer);
                removeTyping();

                const intent = data.intent || 'General';

                if (data.type === 'products' && data.data?.length) {
                    addMsg(data.message || `Tìm thấy ${data.data.length} sản phẩm phù hợp! 👟`, 'bot', intent);
                    renderProductCards(data.data);
                } else {
                    const reply = (data.message || '').trim() || 'Bạn có thể mô tả rõ hơn không ạ?';
                    addMsg(mdToHtml(reply), 'bot', intent);
                }
            } catch (err) {
                clearTimeout(timer);
                removeTyping();
                const msg = err.name === 'AbortError'
                    ? '😅 AI đang xử lý hơi lâu, bạn thử hỏi lại nhé! Hoặc gọi <b>1800 1234</b>.'
                    : '⚠️ Không kết nối được AI lúc này. Vui lòng thử lại sau.';
                addMsg(msg, 'bot');
            } finally {
                inputEl.disabled = false;
                sendBtnEl.disabled = false;
                inputEl.focus();
            }
        }

        function quickSend(text) {
            inputEl.value = text;
            sendChat();
        }

        function clearChat() {
            if (!confirm('Xóa toàn bộ lịch sử chat?')) return;
            messagesEl.innerHTML = '';
            showWelcome();
        }

        // ── Welcome message ───────────────────────────────
        function showWelcome() {
            addMsg(
                'Xin chào! 👋 Mình là <b>SPARK AI</b>, trợ lý tư vấn giày thông minh.<br>' +
                'Bạn có thể hỏi mình về:<br>' +
                '• Chọn giày theo hãng, mục đích, ngân sách<br>' +
                '• Bảng size, chính sách đổi trả, vận chuyển<br>' +
                '• Mã giảm giá đang có<br>' +
                'Hãy bắt đầu nhé! 😊',
                'bot'
            );
        }

        // ── Init ─────────────────────────────────────────
        inputEl.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
        });

        showWelcome();
    </script>
</body>
</html>
